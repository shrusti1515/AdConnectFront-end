<div *ngIf="stats" class="dashboard">

  <h2>Admin Dashboard</h2>

  <div class="cards">

    <div class="card">
      <h3>Total Users</h3>
      <p>{{ stats.totalUsers }}</p>
    </div>

    <div class="card">
      <h3>Clients</h3>
      <p>{{ stats.clients }}</p>
    </div>

    <div class="card">
      <h3>Admakers</h3>
      <p>{{ stats.admakers }}</p>
    </div>

    <div class="card">
      <h3>Active Users</h3>
      <p>{{ stats.active }}</p>
    </div>

    <div class="card">
      <h3>Inactive Users</h3>
      <p>{{ stats.inactive }}</p>
    </div>

  </div>

</div>
